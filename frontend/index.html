<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#2E4A7D" />
    <meta name="description" content="Arakne — aprenda crochê e tecelagem" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!--
      Content-Security-Policy restritiva.
      Modelagem de ameaça: o trabalho de identidade Nostr armazena
      nsec criptografado em localStorage — qualquer XSS rouba a chave de forma
      permanente. Esta CSP bloqueia scripts inline/eval e restringe conexões
      apenas a origens confiáveis (backend local + relays Nostr hardcoded).

      Domínios permitidos para material de estudo das trilhas:
      - https://upload.wikimedia.org — imagens-diagrama CC-BY/CC0
      - https://i.ytimg.com — thumbnails de vídeos do YouTube
      - https://www.youtube-nocookie.com — embed de vídeos (sem cookies/rastreamento)

      NOTA DEV (HMR): o Vite dev server (:5173) injeta scripts inline para Hot
      Module Replacement, o que conflita com `script-src 'self'`. Se o HMR
      quebrar em dev, relaxe TEMPORARIAMENTE para
      `script-src 'self' 'unsafe-inline'` (apenas dev — NUNCA em produção).
      NÃO adicione 'unsafe-eval' sob nenhuma circunstância.

      NOTA (produção): `connect-src http://localhost:8000` é fixo para dev.
      Antes do deploy, tornar configurável por ambiente (ex.: via build-time env).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://upload.wikimedia.org https://i.ytimg.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://localhost:8000 wss://relay.damus.io wss://nos.lol wss://relay.nostr.band https://fonts.googleapis.com https://fonts.gstatic.com; media-src 'self'; frame-src https://www.youtube-nocookie.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    />
    <title>Arakne</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
